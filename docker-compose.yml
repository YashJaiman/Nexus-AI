version: "3.9"

services:
  backend:
    image: nexus-ai-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Add your backend env vars here
      # e.g. PORT: 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  frontend:
    image: nexus-ai-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexus-frontend
    restart: unless-stopped
    environment:
      # This should point to the backend service name + port
      VITE_API_URL: "http://backend:5000"
      VITE_GEMINI_API_KEY: ""  # set as needed or via .env
    ports:
      - "3000:3000"        # or 4173 if using vite preview
    depends_on:
      - backend
